plugins { id 'com.android.application' }

android {
    namespace 'com.min.black'
    compileSdk 33
    defaultConfig {
        applicationId "com.min.black"
        minSdk 21
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        release {
            minifyEnabled true
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
        }
    }
}
